name: windows-package

on:
    release:
        types:
            - published
            - prereleased
    workflow_dispatch:
        inputs:
            release_tag:
                description: 'Release tag to upload assets to (e.g. v0.2.0). Leave empty to skip release upload.'
                required: false
                type: string
            distribution:
                description: 'Build distribution.'
                required: false
                default: stable
                type: choice
                options:
                    - stable
                    - beta
            app_base_url:
                description: 'Desktop cloud base URL override.'
                required: false
                type: string
            auth_base_url:
                description: 'Desktop auth base URL override.'
                required: false
                type: string

permissions:
    contents: write

concurrency:
    group: windows-package-${{ github.ref }}
    cancel-in-progress: false

jobs:
    package:
        runs-on: windows-latest

        env:
            GH_TOKEN: ${{ github.token }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies (retry)
              shell: pwsh
              run: |
                  $maxAttempts = 3
                  $attempt = 1

                  while ($attempt -le $maxAttempts) {
                    Write-Host "Install attempt $attempt..."

                    yarn install --immutable

                    if ($LASTEXITCODE -eq 0) {
                      Write-Host "Dependencies installed successfully"
                      exit 0
                    }

                    Write-Host "Install failed. Retrying in 10 seconds..."
                    Start-Sleep -Seconds 10
                    $attempt++
                  }

                  Write-Error "yarn install failed after $maxAttempts attempts"
                  exit 1

            - name: Resolve release tag
              id: tag
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG=""
                  if [ "${{ github.event_name }}" = "release" ]; then
                    TAG="${{ github.event.release.tag_name }}"
                  elif [ -n "${{ inputs.release_tag }}" ]; then
                    TAG="${{ inputs.release_tag }}"
                  fi
                  echo "Resolved release tag: ${TAG:-<empty>}"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Resolve release kind
              id: release_kind
              if: steps.tag.outputs.tag != ''
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                    IS_PRERELEASE="${{ github.event.release.prerelease }}"
                  else
                    IS_PRERELEASE="$(gh release view "${{ steps.tag.outputs.tag }}" --json isPrerelease -q '.isPrerelease')"
                  fi
                  echo "Resolved prerelease flag: ${IS_PRERELEASE}"
                  echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

            - name: Resolve build config
              id: build_config
              shell: bash
              env:
                  INPUT_DISTRIBUTION: ${{ inputs.distribution }}
                  INPUT_APP_BASE_URL: ${{ inputs.app_base_url }}
                  INPUT_AUTH_BASE_URL: ${{ inputs.auth_base_url }}
                  STABLE_NEXT_PUBLIC_DORY_RUNTIME: ${{ secrets.NEXT_PUBLIC_DORY_RUNTIME }}
                  STABLE_NEXT_PUBLIC_DORY_CLOUD_API_URL: ${{ secrets.NEXT_PUBLIC_DORY_CLOUD_API_URL }}
                  STABLE_BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
              run: |
                  DISTRIBUTION="stable"
                  if [ "${{ github.event_name }}" = "release" ]; then
                    if [ "${{ github.event.release.prerelease }}" = "true" ]; then
                      DISTRIBUTION="beta"
                    fi
                  elif [ -n "$INPUT_DISTRIBUTION" ]; then
                    DISTRIBUTION="$INPUT_DISTRIBUTION"
                  fi

                  if [ "$DISTRIBUTION" = "beta" ]; then
                    APP_BASE_URL="${INPUT_APP_BASE_URL:-https://beta-app.getdory.dev}"
                    APP_BASE_URL="${APP_BASE_URL%/}"
                    AUTH_BASE_URL="${INPUT_AUTH_BASE_URL:-$APP_BASE_URL}"
                    NEXT_PUBLIC_DORY_RUNTIME="desktop"
                    NEXT_PUBLIC_DORY_CLOUD_API_URL="${APP_BASE_URL}/api"
                    DORY_UPDATE_CHANNEL="beta"
                    DORY_ELECTRON_APP_ID="com.dory.app.beta"
                    DORY_PROTOCOL_SCHEME="dory-beta"
                  else
                    APP_BASE_URL="${INPUT_APP_BASE_URL:-}"
                    AUTH_BASE_URL="${INPUT_AUTH_BASE_URL:-$STABLE_BETTER_AUTH_URL}"
                    NEXT_PUBLIC_DORY_RUNTIME="$STABLE_NEXT_PUBLIC_DORY_RUNTIME"
                    NEXT_PUBLIC_DORY_CLOUD_API_URL="$STABLE_NEXT_PUBLIC_DORY_CLOUD_API_URL"
                    DORY_UPDATE_CHANNEL="latest"
                    DORY_ELECTRON_APP_ID=""
                    DORY_PROTOCOL_SCHEME=""
                  fi

                  echo "distribution=$DISTRIBUTION" >> "$GITHUB_OUTPUT"
                  echo "app_base_url=$APP_BASE_URL" >> "$GITHUB_OUTPUT"
                  echo "auth_base_url=$AUTH_BASE_URL" >> "$GITHUB_OUTPUT"
                  echo "next_public_dory_runtime=$NEXT_PUBLIC_DORY_RUNTIME" >> "$GITHUB_OUTPUT"
                  echo "next_public_dory_cloud_api_url=$NEXT_PUBLIC_DORY_CLOUD_API_URL" >> "$GITHUB_OUTPUT"
                  echo "update_channel=$DORY_UPDATE_CHANNEL" >> "$GITHUB_OUTPUT"
                  echo "electron_app_id=$DORY_ELECTRON_APP_ID" >> "$GITHUB_OUTPUT"
                  echo "protocol_scheme=$DORY_PROTOCOL_SCHEME" >> "$GITHUB_OUTPUT"

            - name: Prepare web env
              shell: bash
              env:
                  DISTRIBUTION: ${{ steps.build_config.outputs.distribution }}
                  AUTH_BASE_URL: ${{ steps.build_config.outputs.auth_base_url }}
                  NEXT_PUBLIC_DORY_RUNTIME: ${{ steps.build_config.outputs.next_public_dory_runtime }}
                  NEXT_PUBLIC_DORY_CLOUD_API_URL: ${{ steps.build_config.outputs.next_public_dory_cloud_api_url }}
                  STABLE_BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
                  BETA_BETTER_AUTH_SECRET: ${{ secrets.BETA_BETTER_AUTH_SECRET }}
                  STABLE_DS_SECRET_KEY: ${{ secrets.DS_SECRET_KEY }}
                  BETA_DS_SECRET_KEY: ${{ secrets.BETA_DS_SECRET_KEY }}
                  STABLE_DB_TYPE: ${{ secrets.DB_TYPE }}
                  STABLE_DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  BETA_DATABASE_URL: ${{ secrets.NEON_BETA_DATABASE_URL }}
                  STABLE_TRUSTED_ORIGINS: ${{ secrets.TRUSTED_ORIGINS }}
                  BETA_TRUSTED_ORIGINS: ${{ secrets.BETA_TRUSTED_ORIGINS }}
                  STABLE_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
                  STABLE_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
                  STABLE_DORY_AI_CLOUD_URL: ${{ secrets.DORY_AI_CLOUD_URL }}
              run: |
                  if [ "$DISTRIBUTION" = "beta" ]; then
                    BETTER_AUTH_SECRET="$BETA_BETTER_AUTH_SECRET"
                    DS_SECRET_KEY="$BETA_DS_SECRET_KEY"
                    DB_TYPE="postgres"
                    DATABASE_URL="$BETA_DATABASE_URL"
                    TRUSTED_ORIGINS="$BETA_TRUSTED_ORIGINS"
                    NEXT_PUBLIC_POSTHOG_KEY=""
                    NEXT_PUBLIC_POSTHOG_HOST=""
                    DORY_AI_CLOUD_URL=""
                  else
                    BETTER_AUTH_SECRET="$STABLE_BETTER_AUTH_SECRET"
                    DS_SECRET_KEY="$STABLE_DS_SECRET_KEY"
                    DB_TYPE="$STABLE_DB_TYPE"
                    DATABASE_URL="$STABLE_DATABASE_URL"
                    TRUSTED_ORIGINS="$STABLE_TRUSTED_ORIGINS"
                    NEXT_PUBLIC_POSTHOG_KEY="$STABLE_POSTHOG_KEY"
                    NEXT_PUBLIC_POSTHOG_HOST="$STABLE_POSTHOG_HOST"
                    DORY_AI_CLOUD_URL="$STABLE_DORY_AI_CLOUD_URL"
                  fi

                  cat > apps/web/.env <<EOF
                  BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
                  BETTER_AUTH_URL=$AUTH_BASE_URL

                  DS_SECRET_KEY=$DS_SECRET_KEY

                  DB_TYPE=$DB_TYPE
                  DATABASE_URL=$DATABASE_URL
                  TRUSTED_ORIGINS=$TRUSTED_ORIGINS

                  DORY_CLOUD_API_URL=$NEXT_PUBLIC_DORY_CLOUD_API_URL
                  NEXT_PUBLIC_DORY_RUNTIME=$NEXT_PUBLIC_DORY_RUNTIME
                  NEXT_PUBLIC_DORY_CLOUD_API_URL=$NEXT_PUBLIC_DORY_CLOUD_API_URL
                  NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
                  NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
                  DORY_AI_CLOUD_URL=$DORY_AI_CLOUD_URL
                  EOF

            - name: Build Electron app (Windows)
              shell: bash
              env:
                  DORY_UPDATE_CHANNEL: ${{ steps.build_config.outputs.update_channel }}
                  DORY_DISTRIBUTION: ${{ steps.build_config.outputs.distribution }}
                  DORY_APP_BASE_URL: ${{ steps.build_config.outputs.app_base_url }}
                  DORY_ELECTRON_APP_ID: ${{ steps.build_config.outputs.electron_app_id }}
                  DORY_PROTOCOL_SCHEME: ${{ steps.build_config.outputs.protocol_scheme }}
              run: yarn electron:build:win

            - name: Upload workflow artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.build_config.outputs.distribution == 'beta' && 'electron-windows-beta-dist' || 'electron-windows-dist' }}
                  path: apps/electron/dist/*
                  if-no-files-found: error

            - name: Upload Windows install assets to Release
              if: steps.tag.outputs.tag != ''
              shell: bash
              run: |
                  TAG="${{ steps.tag.outputs.tag }}"
                  find apps/electron/dist -maxdepth 1 -type f \
                    \( -name "*.exe" -o -name "*.msi" -o -name "*.zip" \) \
                    -print0 | xargs -0 -I {} gh release upload "$TAG" "{}" --clobber

            - name: Upload Windows updater metadata to Release
              if: steps.tag.outputs.tag != ''
              shell: bash
              run: |
                  TAG="${{ steps.tag.outputs.tag }}"
                  CHANNEL="${{ steps.build_config.outputs.update_channel }}"
                  find apps/electron/dist -maxdepth 1 -type f -name "*.blockmap" \
                    -print0 | xargs -0 -I {} gh release upload "$TAG" "{}" --clobber
                  find apps/electron/dist -maxdepth 1 -type f -name "${CHANNEL}*.yml" \
                    -print0 | xargs -0 -I {} gh release upload "$TAG" "{}" --clobber
