name: docker-release

on:
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. v0.2.0)."
        required: false
        type: string

env:
  IMAGE_NAME: dorylab/dory

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=""
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "Failed to resolve release tag. Provide a v* tag (for workflow_dispatch, pass release_tag)." >&2
            exit 1
          fi
          if ! echo "$TAG" | grep -Eq '^v[0-9]'; then
            echo "Invalid release tag: $TAG. Only version tags like v0.2.4 are allowed." >&2
            exit 1
          fi
          echo "Resolved release tag: ${TAG:-<empty>}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve image sha tag
        id: git
        run: |
          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "full_sha=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.tag }}
            ${{ env.IMAGE_NAME }}:sha-${{ steps.git.outputs.short_sha }}
          build-args: |
            VERSION=${{ steps.git.outputs.full_sha }}
            BUILD_DATE=${{ github.event.release.published_at || github.event.head_commit.timestamp || github.run_id }}
            GIT_COMMIT=${{ steps.git.outputs.full_sha }}
            GIT_BRANCH=${{ github.ref_name }}
            GIT_TAG=${{ steps.release.outputs.tag }}
