name: macos-package

on:
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to (e.g. v0.2.0). Leave empty to skip release upload."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: macos-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: macos-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare Apple notarization env
        run: |
          cat > apps/electron/.env.apple <<EOF
          APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID_PASSWORD=${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_ID=${{ secrets.APPLE_ID }}
          EOF

      - name: Prepare web env
        run: |
          cat > apps/web/.env <<EOF
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}

          DS_SECRET_KEY=${{ secrets.DS_SECRET_KEY }}

          DB_TYPE=${{ secrets.DB_TYPE }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          TRUSTED_ORIGINS=${{ secrets.TRUSTED_ORIGINS }}

          NEXT_PUBLIC_DORY_RUNTIME=${{ secrets.NEXT_PUBLIC_DORY_RUNTIME }}
          NEXT_PUBLIC_DORY_CLOUD_API_URL=${{ secrets.NEXT_PUBLIC_DORY_CLOUD_API_URL }}
          DORY_AI_CLOUD_URL=${{ secrets.DORY_AI_CLOUD_URL }}
          EOF

      - name: Build Electron app (mac)
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
        run: yarn electron:build:apple

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-macos-dist
          path: apps/electron/dist/*
          if-no-files-found: error

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=""
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          fi
          echo "Resolved release tag: ${TAG:-<empty>}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload macOS assets to Release
        if: steps.tag.outputs.tag != ''
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          find apps/electron/dist -maxdepth 1 -type f \
            \( -name "*.dmg" -o -name "*.zip" -o -name "*.blockmap" -o -name "latest*.yml" \) \
            -print0 | xargs -0 -I {} gh release upload "$TAG" "{}" --clobber
