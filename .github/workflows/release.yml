name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Create as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Bump version in package.json files
        id: version
        run: |
          npm version "${{ inputs.bump }}" --no-git-tag-version
          NEW_VERSION="$(node -p "require('./package.json').version")"
          for app_pkg in apps/*/package.json; do
            app_dir="$(dirname "$app_pkg")"
            npm --prefix "$app_dir" version "$NEW_VERSION" --no-git-tag-version
          done
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json apps/*/package.json
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Dispatch packaging workflows
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          gh workflow run ".github/workflows/macos-package.yml" \
            --ref "${{ github.ref_name }}" \
            -f release_tag="$TAG"

          gh workflow run ".github/workflows/windows-package.yml" \
            --ref "${{ github.ref_name }}" \
            -f release_tag="$TAG"

          gh workflow run ".github/workflows/docker-release.yml" \
            --ref "${{ github.ref_name }}" \
            -f release_tag="$TAG"
