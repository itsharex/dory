name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release action"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - promote
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

permissions:
  actions: write
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: yarn install --immutable

      - name: Compute release version
        id: version
        run: |
          case "${{ inputs.channel }}:${{ inputs.bump }}" in
            stable:patch|stable:minor|stable:major)
              npm version "${{ inputs.bump }}" --no-git-tag-version
              ;;
            stable:promote)
              NEW_VERSION="$(node -e "const version=require('./package.json').version; if (!version.includes('-')) { process.stderr.write('Current version is not a prerelease\\n'); process.exit(1); } process.stdout.write(version.split('-')[0]);")"
              npm version "$NEW_VERSION" --no-git-tag-version
              ;;
            beta:patch|beta:minor|beta:major)
              npm version "pre${{ inputs.bump }}" --preid beta --no-git-tag-version
              ;;
            beta:prerelease)
              npm version prerelease --preid beta --no-git-tag-version
              ;;
            *)
              echo "Unsupported combination: channel=${{ inputs.channel }}, bump=${{ inputs.bump }}"
              exit 1
              ;;
          esac
          NEW_VERSION="$(node -p "require('./package.json').version")"
          for app_pkg in apps/*/package.json; do
            app_dir="$(dirname "$app_pkg")"
            npm --prefix "$app_dir" version "$NEW_VERSION" --no-git-tag-version
          done
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        uses: ./.github/actions/release-notes
        env:
          RELEASE_NOTES_AI_PROVIDER: ${{ secrets.RELEASE_NOTES_AI_PROVIDER || 'openai' }}
          RELEASE_NOTES_AI_MODEL: ${{ secrets.RELEASE_NOTES_AI_MODEL || 'gpt-4o-mini' }}
          RELEASE_NOTES_AI_API_KEY: ${{ secrets.RELEASE_NOTES_AI_API_KEY }}
          RELEASE_NOTES_AI_URL: ${{ secrets.RELEASE_NOTES_AI_URL }}
        with:
          tag: v${{ steps.version.outputs.version }}
          to_ref: HEAD

      - name: Commit version, notes, and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json apps/*/package.json release-notes/*.md
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          NOTES_FILE="${{ steps.release_notes.outputs.notes_file }}"
          PRERELEASE_FLAG=""
          if [ "${{ inputs.channel }}" = "beta" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            $PRERELEASE_FLAG

      - name: Dispatch packaging workflows
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          gh workflow run ".github/workflows/macos-package.yml" \
            --ref "${{ github.ref_name }}" \
            -f release_tag="$TAG"

          gh workflow run ".github/workflows/windows-package.yml" \
            --ref "${{ github.ref_name }}" \
            -f release_tag="$TAG"

          gh workflow run ".github/workflows/docker-release.yml" \
            --ref "${{ github.ref_name }}" \
            -f release_tag="$TAG"
