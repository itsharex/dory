<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Software Update</title>
  <style>
    :root {
      --bg: white;
      --surface: white;
      --text: black;
      --muted: black;
      --primary: #007aff;
      --btn: #d9d9dc;
      --logo-bg: #ececef;
      --logo-border: #d7d7dc;
      --progress-track: #dcdde0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1b1b1d;
        --surface: #232326;
        --text: #f4f4f5;
        --muted: #b7bac1;
        --btn: #3d3f44;
        --logo-bg: #2e2f34;
        --logo-border: #3f4148;
        --progress-track: #3a3d45;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    .dialog {
      width: 100%;
      height: 100%;
      background: var(--surface);
      padding: 22px 16px;
      margin-top: 16px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: none;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .main {
      flex: 1;
      min-width: 0;
    }

    .message {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 700;
    }

    .progress {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: var(--progress-track);
      overflow: hidden;
      margin: 14px 0;
    }

    .bar {
      height: 100%;
      width: 0;
      background: var(--primary);
      transition: width 180ms linear;
    }

    .bar.indeterminate {
      width: 24%;
      animation: indeterminate 1.15s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(420%); }
    }

    .progress-text {
      font-size: 12px;
      line-height: 1.4;
      color: var(--text);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }

    .spacer {
      flex: 1;
    }

    .action-btn {
      border: 0;
      border-radius: 14px;
      background: var(--btn);
      color: var(--text);
      font-size: 12px;
      line-height: 1;
      font-weight: 400;
      cursor: pointer;
      padding: 8px 16px;
      white-space: nowrap;
    }

    .action-btn.primary {
      background: var(--primary);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="dialog">
    <div class="row">
      <div class="logo">
        <img id="logoImg" src="./logo.png" alt="App Logo" />
      </div>
      <div class="main">
        <p class="message" id="message">Checking for updates...</p>
        <div class="progress">
          <div class="bar" id="bar"></div>
        </div>
        <div class="footer">
          <div class="progress-text" id="progressText"></div>
          <div class="spacer"></div>
          <button id="secondaryBtn" class="action-btn">Cancel</button>
          <button id="primaryBtn" class="action-btn primary" style="display:none;">Restart and Install</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    const messageEl = document.getElementById('message');
    const barEl = document.getElementById('bar');
    const progressTextEl = document.getElementById('progressText');
    const secondaryBtn = document.getElementById('secondaryBtn');
    const primaryBtn = document.getElementById('primaryBtn');
    const logoImg = document.getElementById('logoImg');

    let secondaryAction = 'dismiss';
    let primaryAction = 'restart-now';

    logoImg.addEventListener('error', () => {
      logoImg.src = '../../web/public/logo.png';
    }, { once: true });

    const applyState = state => {
      document.documentElement.lang = state.lang || 'en';
      document.title = state.title || 'Software Update';
      messageEl.textContent = state.message || '';
      progressTextEl.textContent = state.progressText || '';

      if (state.progress === null) {
        barEl.classList.add('indeterminate');
        barEl.style.width = '';
      } else {
        barEl.classList.remove('indeterminate');
        const clamped = Math.max(0, Math.min(1, Number(state.progress) || 0));
        barEl.style.width = `${clamped * 100}%`;
      }

      if (state.secondaryLabel) {
        secondaryBtn.style.display = 'inline-flex';
        secondaryBtn.textContent = state.secondaryLabel;
      } else {
        secondaryBtn.style.display = 'none';
      }

      if (state.primaryLabel) {
        primaryBtn.style.display = 'inline-flex';
        primaryBtn.textContent = state.primaryLabel;
      } else {
        primaryBtn.style.display = 'none';
      }

      secondaryAction = state.secondaryAction || 'dismiss';
      primaryAction = state.primaryAction || 'restart-now';
    };

    secondaryBtn.addEventListener('click', () => {
      ipcRenderer.send('updater:action', secondaryAction);
    });

    primaryBtn.addEventListener('click', () => {
      ipcRenderer.send('updater:action', primaryAction);
    });

    ipcRenderer.on('updater:progress-state', (_event, state) => {
      applyState(state);
    });
  </script>
</body>
</html>
