<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Software Update</title>
  <style>
    :root {
      --bg: white;
      --surface: white;
      --text: black;
      --muted: black;
      --primary: #007aff;
      --btn: #e3e3e7;
      --logo-bg: #ececef;
      --logo-border: #d7d7dc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1b1b1d;
        --surface: #232326;
        --text: #f4f4f5;
        --muted: #b7bac1;
        --btn: #3a3a3f;
        --logo-bg: #2e2f34;
        --logo-border: #3f4148;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    .dialog {
      width: 100%;
      height: 100%;
      background: var(--surface);
      padding: 40px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .content {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex: none;
      user-select: none;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .main {
      flex: 1;
      min-width: 0;
    }

    .message {
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: 0.1px;
    }

    .detail {
      margin: 4px 0 0;
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
      min-height: 16px;
      max-height: 32px;
      overflow: hidden;
    }

    .auto-download {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 2px;
      margin-top: 4px;
      font-size: 11px;
      line-height: 1.3;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .auto-download input {
      width: 14px;
      height: 14px;
      accent-color: var(--primary);
      flex: none;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0;
      gap: 8px;
    }

    .actions-right {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    button {
      min-width: 104px;
      height: 28px;
      border: 0;
      border-radius: 14px;
      background: var(--btn);
      color: var(--text);
      font-size: 12px;
      line-height: 1;
      font-weight: 400;
      cursor: pointer;
      padding: 0 10px;
      white-space: nowrap;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="dialog">
    <div class="content">
      <div class="logo">
        <img id="logoImg" src="./logo.png" alt="App Logo" />
      </div>
      <div class="main">
        <p class="message" id="message">A new version is available.</p>
        <p class="detail" id="detail">Download and install now?</p>
      </div>
    </div>
    <label class="auto-download" id="autoDownloadWrap">
      <input id="autoDownloadCheckbox" type="checkbox" />
      <span id="autoDownloadLabel">Automatically download and install updates</span>
    </label>
    <div class="actions">
      <button id="tertiaryBtn">Skip This Version</button>
      <div class="actions-right">
        <button id="secondaryBtn">Remind Me Later</button>
        <button id="primaryBtn" class="primary">Install Update</button>
      </div>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    const messageEl = document.getElementById('message');
    const detailEl = document.getElementById('detail');
    const tertiaryBtn = document.getElementById('tertiaryBtn');
    const secondaryBtn = document.getElementById('secondaryBtn');
    const primaryBtn = document.getElementById('primaryBtn');
    const logoImg = document.getElementById('logoImg');
    const autoDownloadLabel = document.getElementById('autoDownloadLabel');
    const autoDownloadCheckbox = document.getElementById('autoDownloadCheckbox');

    logoImg.addEventListener('error', () => {
      logoImg.src = '../../web/public/logo.png';
    }, { once: true });

    const applyState = state => {
      document.documentElement.lang = state.lang || 'en';
      document.title = state.title || 'Software Update';
      messageEl.textContent = state.message || '';
      detailEl.textContent = state.detail || '';
      autoDownloadLabel.textContent = state.autoDownloadLabel || '';
      autoDownloadCheckbox.checked = Boolean(state.autoDownloadChecked);
      tertiaryBtn.textContent = state.tertiaryLabel || '';
      secondaryBtn.textContent = state.secondaryLabel || '';
      primaryBtn.textContent = state.primaryLabel || '';
    };

    tertiaryBtn.addEventListener('click', () => {
      ipcRenderer.send('updater:action', 'skip-version');
    });
    secondaryBtn.addEventListener('click', () => {
      ipcRenderer.send('updater:action', 'dismiss');
    });
    primaryBtn.addEventListener('click', () => {
      ipcRenderer.send('updater:action', 'install-update');
    });
    autoDownloadCheckbox.addEventListener('change', () => {
      ipcRenderer.send('updater:auto-download', autoDownloadCheckbox.checked);
    });

    ipcRenderer.on('updater:available-state', (_event, state) => {
      applyState(state);
    });
  </script>
</body>
</html>
